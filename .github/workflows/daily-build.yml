name: Daily Morning Wire Build

on:
  schedule:
    # 09:37 UTC = 05:37 America/New_York during EDT (04:37 during EST).
    # GitHub fires scheduled runs 1–5 hours late on congested days, so an
    # early, off-the-hour slot still lands the edition before mid-morning.
    - cron: '37 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Backstop only — the Generate step enforces its own 50-minute cap so a
    # slow run fails as "failure" (which triggers the alert step) rather than
    # being cancelled silently by the job-level limit.
    timeout-minutes: 55

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI (pinned)
        # Pinned so a new CLI release can't silently change behavior or speed.
        # Bump deliberately, and check the run duration after bumping.
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.170
          claude --version

      - name: Show today's date (America/New_York)
        run: TZ='America/New_York' date

      - name: Generate today's edition
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # stream-json + jq turns the formerly-silent 20+ minute wait into a
        # live progress log (each tool call and message as it happens), so a
        # stuck or slow run is diagnosable from the logs alone.
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=2m 50m claude \
            --print \
            --verbose \
            --output-format stream-json \
            --model claude-sonnet-4-6 \
            --dangerously-skip-permissions \
            --allowed-tools "Read,Write,Edit,Bash,WebSearch,WebFetch,Glob,Grep" \
            < .github/prompts/daily-build.md \
            | jq --unbuffered -r '
                if .type == "assistant" then
                  (.message.content[]? |
                    if .type == "text" then .text
                    elif .type == "tool_use" then "⏵ tool: " + .name
                    else empty end)
                elif .type == "result" then
                  "■ finished (" + (.subtype // "unknown") + ") after " +
                  ((.duration_ms // 0) / 60000 * 10 | floor / 10 | tostring) + " min"
                elif .type == "error" then
                  "⚠ ERROR: " + (.error.message // .message // "unknown error")
                else
                  "⚠ unexpected event type: " + .type
                end'

      - name: Validate generated output
        run: |
          set -euo pipefail
          EXPECTED_FILES="index.html tech-ai.html crypto.html markets.html world.html science.html"
          MIN_SIZE=4096   # a valid edition page is ≥13 KB; 4 KB catches truncated/empty files
          ERRORS=0
          for f in $EXPECTED_FILES; do
            path="public/$f"
            if [ ! -f "$path" ]; then
              echo "::error::Missing expected file: $path"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            size=$(stat --format='%s' "$path")
            if [ "$size" -lt "$MIN_SIZE" ]; then
              echo "::error::$path is suspiciously small (${size} bytes, min ${MIN_SIZE})"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -qi '<html' "$path"; then
              echo "::error::$path does not look like valid HTML (missing <html tag)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Output validation failed with $ERRORS error(s) — aborting before commit."
            exit 1
          fi
          echo "All 6 HTML files present and valid."

      - name: Commit and push if changed
        id: publish
        run: |
          git config user.name "morning-wire-bot"
          git config user.email "bot@morning-wire.local"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes produced by build — skipping commit."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add public/
          DATE=$(TZ='America/New_York' date +'%A, %B %-d, %Y')
          git commit -m "The Morning Wire — ${DATE}"
          git push origin main
          # Signal the notification step that a fresh edition went live.
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Email the new edition link
        # Only fires when a fresh edition was actually published. Both the
        # sender and recipient are MAIL_USERNAME, so you only need two secrets:
        # MAIL_USERNAME (your Gmail address) and MAIL_PASSWORD (a Google
        # app password — NOT your account password). If the secrets are
        # missing the step is skipped, so the build never fails over email.
        if: steps.publish.outputs.published == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: The Morning Wire <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_USERNAME }}
          subject: "The Morning Wire — ${{ steps.publish.outputs.date }}"
          html_body: |
            <div style="font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 480px;">
              <h2 style="margin-bottom: 4px;">The Morning Wire</h2>
              <p style="color: #555; margin-top: 0;">${{ steps.publish.outputs.date }}</p>
              <p>This morning's edition is live.</p>
              <p>
                <a href="https://morning-wire-rho.vercel.app"
                   style="display: inline-block; padding: 10px 18px; background: #0B0F14;
                          color: #FBF8F3; text-decoration: none; border-radius: 6px;">
                  Read today's edition →
                </a>
              </p>
              <p style="color: #888; font-size: 13px;">https://morning-wire-rho.vercel.app</p>
            </div>
          body: |
            The Morning Wire — ${{ steps.publish.outputs.date }}

            This morning's edition is live:
            https://morning-wire-rho.vercel.app

      - name: Write job summary
        if: always()
        run: |
          DATE=$(TZ='America/New_York' date +'%A, %B %-d, %Y')
          echo "## The Morning Wire — ${DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "Build succeeded." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Build status: ${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in public/*.html; do
            if [ -f "$f" ]; then
              size=$(stat --format='%s' "$f")
              echo "| $f | ${size} bytes |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Open a GitHub issue if the build failed
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE=$(TZ='America/New_York' date +'%A, %B %-d, %Y')
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "Daily Morning Wire build failed in:title" \
            --json number --jq '.[0].number // empty') || true
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" \
              --body "Failed again on ${DATE}. Logs: ${RUN_URL}" \
            || echo "::warning::Failed to comment on issue #${EXISTING} — check token permissions."
          else
            BODY=$(printf 'The morning edition did not publish. Check the logs: %s\n\nCommon causes:\n- The run exceeded its 50-minute budget (look at the last logged tool call).\n- Claude authentication failed (an error will be printed at the top of the Generate step).\n- Output validation failed (one or more HTML files were missing, empty, or malformed).\n- `git push` was rejected (merge conflict or permissions).' "$RUN_URL")
            gh issue create --repo "${{ github.repository }}" \
              --title "Daily Morning Wire build failed — ${DATE}" \
              --body "$BODY" \
            || echo "::warning::Failed to create issue — check token permissions."
          fi
